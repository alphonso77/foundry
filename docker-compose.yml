# ─────────────────────────────────────────────────────────────────────────────
# Foundry — local dev topology.
#
#   docker compose up
#     → postgres + API server (:4000) + portal web (:5173), auth bypassed.
#
# Or run without Docker (faster iteration):
#     npm install
#     npm run dev          # API server only (packages/server, tsx watch)
#     npm run dev -w portal-web   # the portal's Vite dev server
#
# Each service runs `npm install` on start and mounts the repo, so source edits
# hot-reload. node_modules is an anonymous volume per service so the host's
# (macOS) native binaries never leak into the (linux) containers.
#
# NOTE: Postgres mirrors the real topology and backs *generated* projects'
# eventual use. The generator never opens a DB connection, so generation works
# even if postgres is down — do not make `server` depend on its health.
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foundry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foundry}
      POSTGRES_DB: ${POSTGRES_DB:-foundry}
    ports:
      - '5432:5432'
    volumes:
      - foundry-pgdata:/var/lib/postgresql/data

  server:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -w @foundry/server"
    environment:
      SERVER_PORT: 4000
      AUTH_DISABLED: 'true'
      PORTAL_ORIGIN: http://localhost:5173
      DATABASE_URL: postgres://${POSTGRES_USER:-foundry}:${POSTGRES_PASSWORD:-foundry}@postgres:5432/${POSTGRES_DB:-foundry}
    ports:
      - '4000:4000'
    volumes:
      - .:/app
      - /app/node_modules
    # No depends_on health gate: the generator does not need the DB.
    depends_on:
      - postgres

  # The portal app lives under apps/portal-web; this service definition (port,
  # env, command) runs its Vite dev server.
  portal-web:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -w @foundry/portal-web -- --host 0.0.0.0"
    environment:
      VITE_SERVER_ORIGIN: http://server:4000
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - server

volumes:
  foundry-pgdata:
